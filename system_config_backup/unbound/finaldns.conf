server:
    # interface: 0.0.0.0
    # port: 5353
    do-ip4: yes
    do-udp: yes
    do-tcp: yes

    # Access control
    access-control: 127.0.0.0/8 allow
    access-control: ::1 allow

    # Privacy & Security
    hide-identity: yes
    hide-version: yes
    use-caps-for-id: yes
    prefetch: yes
    minimal-responses: yes

    # High-performance tuning (16 Threads, 16GB RAM)
    num-threads: 16
    msg-cache-slabs: 16
    rrset-cache-slabs: 16
    infra-cache-slabs: 16
    key-cache-slabs: 16
    
    # Cache sizing for 16GB RAM (using approx 4GB for caches)
    rrset-cache-size: 2048m
    msg-cache-size: 1024m
    
    # Connection management
    so-reuseport: yes
    outgoing-range: 8192
    num-queries-per-thread: 4096
    
    # Increase buffer sizes for high traffic
    so-rcvbuf: 16m
    so-sndbuf: 16m

